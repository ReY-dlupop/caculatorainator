<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор прогноза продаж</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .description {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .input-area {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            font-size: 14px;
            padding: 10px;
            box-sizing: border-box;
        }
        label {
            font-weight: bold;
            margin-right: 10px;
        }
        input[type="number"] {
            width: 80px;
            padding: 5px;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: #ddd;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab.active {
            background: #4CAF50;
            color: white;
        }
        .result {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result h3 {
            color: #4CAF50;
        }
        .prediction {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
        }
        table {
            border-collapse: collapse;
            margin: 15px 0;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: center;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        canvas {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 100%;
            max-width: 850px;
        }
        .formula {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        .main-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .main-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

    <h1>Калькулятор прогноза продаж</h1>

    <div class="description">
        <p>Введите данные о продажах за несколько периодов. Каждая строка: <strong>год, количество продаж (тыс. шт.)</strong> через запятую.</p>
        <p>Пример: 2021, 110</p>
        <p>Выберите вид тренда и нажмите «Рассчитать».</p>
    </div>

    <div class="input-area">
        <h3>Введите данные:</h3>
        <textarea id="dataInput">2021, 110
2022, 122
2023, 131
2024, 145
2025, 152</textarea>
        <br><br>
        <label>Год для прогноза: <input type="number" id="predictYear" value="2026" min="2000" max="2100"></label>
        <br><br>
        <div class="tabs">
            <button class="tab active" onclick="setType('linear')">Линейный</button>
            <button class="tab" onclick="setType('quadratic')">Квадратичный</button>
            <button class="tab" onclick="setType('exponential')">Экспоненциальный</button>
            <button class="tab" onclick="setType('logarithmic')">Логарифмический</button>
        </div>
        <br>
        <button class="main-btn" onclick="calculate()">Рассчитать</button>
    </div>

    <div class="result" id="result">
        <h3>Результаты расчёта</h3>
        <p id="trendType"></p>
        <p class="formula" id="formula"></p>
        <p class="prediction" id="prediction"></p>
        <div id="resultContent"></div>
        <canvas id="chart" width="850" height="400"></canvas>
    </div>

    <script>
        let currentType = 'linear';

        function setType(type) {
            currentType = type;
            let tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        function calculate() {
            let input = document.getElementById('dataInput').value.trim();
            let predictYear = parseInt(document.getElementById('predictYear').value);
            
            if (!input) {
                alert('Введите данные!');
                return;
            }

            let lines = input.split('\n');
            let years = [];
            let yValues = [];
            let xValues = [];

            for (let i = 0; i < lines.length; i++) {
                let parts = lines[i].split(',');
                if (parts.length >= 2) {
                    let year = parseInt(parts[0].trim());
                    let y = parseFloat(parts[1].trim());
                    if (!isNaN(year) && !isNaN(y)) {
                        years.push(year);
                        yValues.push(y);
                        xValues.push(i + 1);
                    }
                }
            }

            if (years.length < 3) {
                alert('Нужно минимум 3 точки данных!');
                return;
            }

            let n = years.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;

            for (let i = 0; i < n; i++) {
                sumX += xValues[i];
                sumY += yValues[i];
                sumXY += xValues[i] * yValues[i];
                sumX2 += xValues[i] * xValues[i];
            }

            let resultDiv = document.getElementById('resultContent');
            resultDiv.innerHTML = '';

            let table = '<table><tr><th>Год</th><th>X (номер)</th><th>Y (продажи)</th><th>X2</th><th>X*Y</th></tr>';
            for (let i = 0; i < n; i++) {
                table += '<tr><td>' + years[i] + '</td><td>' + xValues[i] + '</td><td>' + yValues[i] + '</td><td>' + (xValues[i]*xValues[i]) + '</td><td>' + (xValues[i]*yValues[i]) + '</td></tr>';
            }
            table += '<tr style="font-weight:bold; background:#f0f0f0;"><td>Суммы</td><td>' + sumX + '</td><td>' + sumY + '</td><td>' + sumX2 + '</td><td>' + sumXY + '</td></tr>';
            table += '</table>';
            resultDiv.innerHTML += table;

            let predictX = years[years.length - 1] - years[0] + 2;
            let prediction, formulaText, trendName;

            if (currentType === 'linear') {
                let k = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                let b = (sumY - k * sumX) / n;
                k = Math.round(k * 100) / 100;
                b = Math.round(b * 100) / 100;
                prediction = Math.round((k * predictX + b) * 10) / 10;
                formulaText = 'y = ' + b + ' + ' + k + 'x';
                trendName = 'Линейный тренд';
                resultDiv.innerHTML += '<p>Система уравнений: <strong>' + n + 'b + ' + sumX + 'k = ' + sumY + '</strong> и <strong>' + sumX + 'b + ' + sumX2 + 'k = ' + sumXY + '</strong></p>';
            } else if (currentType === 'quadratic') {
                let sumX3 = 0, sumX4 = 0, sumX2Y = 0;
                for (let i = 0; i < n; i++) {
                    sumX3 += Math.pow(xValues[i], 3);
                    sumX4 += Math.pow(xValues[i], 4);
                    sumX2Y += xValues[i] * xValues[i] * yValues[i];
                }
                let det = n * (sumX2 * sumX4 - sumX3 * sumX3) - sumX * (sumX * sumX4 - sumX2 * sumX3) + sumX2 * (sumX * sumX3 - sumX2 * sumX2);
                let detA = sumY * (sumX2 * sumX4 - sumX3 * sumX3) - sumX * (sumXY * sumX4 - sumX2Y * sumX3) + sumX2 * (sumXY * sumX3 - sumX2Y * sumX2);
                let detB = n * (sumXY * sumX4 - sumX2Y * sumX3) - sumY * (sumX * sumX4 - sumX2 * sumX3) + sumX2 * (sumX * sumX2Y - sumXY * sumX2);
                let detC = n * (sumX2 * sumX2Y - sumX3 * sumXY) - sumX * (sumX * sumX2Y - sumX2 * sumXY) + sumY * (sumX * sumX3 - sumX2 * sumX2);
                let a = detA / det;
                let b = detB / det;
                let c = detC / det;
                a = Math.round(a * 100) / 100;
                b = Math.round(b * 100) / 100;
                c = Math.round(c * 100) / 100;
                prediction = Math.round((a * predictX * predictX + b * predictX + c) * 10) / 10;
                formulaText = 'y = ' + a + 'x2 + ' + b + 'x + ' + c;
                trendName = 'Квадратичный тренд (парабола)';
            } else if (currentType === 'exponential') {
                let lnY = yValues.map(function(y) { return Math.log(y); });
                let sumLnY = 0, sumXLnY = 0;
                for (let i = 0; i < n; i++) {
                    sumLnY += lnY[i];
                    sumXLnY += xValues[i] * lnY[i];
                }
                let k = (n * sumXLnY - sumX * sumLnY) / (n * sumX2 - sumX * sumX);
                let lnB = (sumLnY - k * sumX) / n;
                let A = Math.exp(lnB);
                let B = Math.exp(k);
                A = Math.round(A * 100) / 100;
                B = Math.round(B * 10000) / 10000;
                prediction = Math.round((A * Math.pow(B, predictX)) * 10) / 10;
                formulaText = 'y = ' + A + ' * ' + B + '^x';
                trendName = 'Экспоненциальный тренд';
            } else if (currentType === 'logarithmic') {
                let lnX = xValues.map(function(x) { return Math.log(x); });
                let sumLnX = 0, sumLnX2 = 0, sumYLnX = 0;
                for (let i = 0; i < n; i++) {
                    sumLnX += lnX[i];
                    sumLnX2 += lnX[i] * lnX[i];
                    sumYLnX += yValues[i] * lnX[i];
                }
                let k = (n * sumYLnX - sumY * sumLnX) / (n * sumLnX2 - sumLnX * sumLnX);
                let b = (sumY - k * sumLnX) / n;
                k = Math.round(k * 100) / 100;
                b = Math.round(b * 100) / 100;
                prediction = Math.round((k * Math.log(predictX) + b) * 10) / 10;
                formulaText = 'y = ' + b + ' + ' + k + ' * ln(x)';
                trendName = 'Логарифмический тренд';
            }

            document.getElementById('trendType').innerHTML = '<strong>Тип тренда:</strong> ' + trendName;
            document.getElementById('formula').innerHTML = 'Уравнение: ' + formulaText;
            document.getElementById('prediction').innerHTML = 'Прогноз на ' + predictYear + ' год: ' + prediction + ' тыс. шт.';
            document.getElementById('result').style.display = 'block';

            drawChart(xValues, yValues, currentType, predictX, prediction, years);
        }

        function drawChart(xVals, yVals, type, predX, predY, years) {
            let canvas = document.getElementById('chart');
            let ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let padding = 80;
            let w = canvas.width - padding * 2;
            let h = canvas.height - padding * 2;
            
            let allX = xVals.concat([predX]);
            let minX = Math.min.apply(null, allX) - 0.5;
            let maxX = Math.max.apply(null, allX) + 0.5;
            
            let allY = yVals.concat([predY]);
            let minY = Math.min.apply(null, allY) - 20;
            let maxY = Math.max.apply(null, allY) + 20;
            
            function toX(val) { return padding + (val - minX) / (maxX - minX) * w; }
            function toY(val) { return padding + h - (val - minY) / (maxY - minY) * h; }
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, padding + h);
            ctx.lineTo(padding + w, padding + h);
            ctx.stroke();
            
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            for (let i = Math.ceil(minX); i <= maxX; i++) {
                let x = toX(i);
                ctx.fillText(i, x, padding + h + 20);
            }
            ctx.textAlign = 'right';
            for (let i = Math.floor(minY / 10) * 10; i <= maxY; i += 20) {
                let y = toY(i);
                ctx.fillText(i, padding - 10, y + 4);
            }
            ctx.fillStyle = '#4CAF50';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Год (X)', padding + w/2, padding + h + 45);
            ctx.save();
            ctx.translate(15, padding + h/2);
            ctx.rotate(-Math.PI/2);
            ctx.fillText('Продажи, тыс. шт. (Y)', 0, 0);
            ctx.restore();
            
            for (let i = 0; i < xVals.length; i++) {
                let cx = toX(xVals[i]);
                let cy = toY(yVals[i]);
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.font = '11px Arial';
                ctx.fillText(years[i], cx, cy - 12);
            }
            
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            if (type === 'linear') {
                let n = xVals.length;
                let sumX = 0, sumY2 = 0, sumXY = 0, sumX2 = 0;
                for (let i = 0; i < n; i++) {
                    sumX += xVals[i]; sumY2 += yVals[i];
                    sumXY += xVals[i]*yVals[i]; sumX2 += xVals[i]*xVals[i];
                }
                let k = (n*sumXY - sumX*sumY2)/(n*sumX2 - sumX*sumX);
                let b = (sumY2 - k*sumX)/n;
                let y1 = k*minX + b, y2 = k*maxX + b;
                ctx.moveTo(toX(minX), toY(y1));
                ctx.lineTo(toX(maxX), toY(y2));
            } else if (type === 'quadratic') {
                let n = xVals.length;
                let sumX = 0, sumY2 = 0, sumXY = 0, sumX2 = 0, sumX3 = 0, sumX4 = 0, sumX2Y = 0;
                for (let i = 0; i < n; i++) {
                    sumX += xVals[i]; sumY2 += yVals[i];
                    sumXY += xVals[i]*yVals[i]; sumX2 += xVals[i]*xVals[i];
                    sumX3 += Math.pow(xVals[i], 3); sumX4 += Math.pow(xVals[i], 4);
                    sumX2Y += xVals[i]*xVals[i]*yVals[i];
                }
                let det = n*(sumX2*sumX4 - sumX3*sumX3) - sumX*(sumX*sumX4 - sumX2*sumX3) + sumX2*(sumX*sumX3 - sumX2*sumX2);
                let detA = sumY2*(sumX2*sumX4 - sumX3*sumX3) - sumX*(sumXY*sumX4 - sumX2Y*sumX3) + sumX2*(sumXY*sumX3 - sumX2Y*sumX2);
                let detB = n*(sumXY*sumX4 - sumX2Y*sumX3) - sumY2*(sumX*sumX4 - sumX2*sumX3) + sumX2*(sumX*sumX2Y - sumXY*sumX2);
                let detC = n*(sumX2*sumX2Y - sumX3*sumXY) - sumX*(sumX*sumX2Y - sumX2*sumXY) + sumY2*(sumX*sumX3 - sumX2*sumX2);
                let a = detA/det, b = detB/det, c = detC/det;
                for (let x = minX; x <= maxX; x += 0.1) {
                    let y = a*x*x + b*x + c;
                    if (x === minX) ctx.moveTo(toX(x), toY(y));
                    else ctx.lineTo(toX(x), toY(y));
                }
            } else if (type === 'exponential') {
                let n = xVals.length;
                let sumX = 0, sumLnY = 0, sumXLnY = 0, sumX2 = 0;
                let lnY = yVals.map(function(y) { return Math.log(y); });
                for (let i = 0; i < n; i++) {
                    sumX += xVals[i]; sumLnY += lnY[i];
                    sumXLnY += xVals[i]*lnY[i]; sumX2 += xVals[i]*xVals[i];
                }
                let k = (n*sumXLnY - sumX*sumLnY)/(n*sumX2 - sumX*sumX);
                let lnB = (sumLnY - k*sumX)/n;
                let A = Math.exp(lnB), B = Math.exp(k);
                for (let x = minX; x <= maxX; x += 0.1) {
                    let y = A * Math.pow(B, x);
                    if (x === minX) ctx.moveTo(toX(x), toY(y));
                    else ctx.lineTo(toX(x), toY(y));
                }
            } else if (type === 'logarithmic') {
                let n = xVals.length;
                let sumLnX = 0, sumY2 = 0, sumYLnX = 0, sumLnX2 = 0;
                let lnX = xVals.map(function(x) { return Math.log(x); });
                for (let i = 0; i < n; i++) {
                    sumLnX += lnX[i]; sumY2 += yVals[i];
                    sumYLnX += yVals[i]*lnX[i]; sumLnX2 += lnX[i]*lnX[i];
                }
                let k = (n*sumYLnX - sumY2*sumLnX)/(n*sumLnX2 - sumLnX*sumLnX);
                let b = (sumY2 - k*sumLnX)/n;
                for (let x = 0.1; x <= maxX; x += 0.1) {
                    let y = k*Math.log(x) + b;
                    if (x === 0.1) ctx.moveTo(toX(x), toY(y));
                    else ctx.lineTo(toX(x), toY(y));
                }
            }
            ctx.stroke();
            
            let px = toX(predX);
            let py = toY(predY);
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(px, py, 7, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 13px Arial';
            ctx.fillText('Прогноз: ' + predY, px, py - 18);
        }
    </script>

</body>
</html>
