<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор прогноза продаж</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .description {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .input-area {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            font-size: 14px;
            padding: 10px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result h3 {
            color: #4CAF50;
        }
        .result p {
            font-size: 18px;
            margin: 5px 0;
        }
        .prediction {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
        }
        table {
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: center;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        canvas {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Калькулятор прогноза продаж</h1>

    <div class="description">
        <p>Введите данные о продажах за несколько периодов. Каждая строка: <strong>год, количество продаж (тыс. шт.)</strong> через запятую.</p>
        <p>Пример:</p>
        <p>2021, 110<br>2022, 122<br>2023, 131<br>2024, 145<br>2025, 152</p>
    </div>

    <div class="input-area">
        <h3>Введите данные:</h3>
        <textarea id="dataInput" placeholder="2021, 110
2022, 122
2023, 131
2024, 145
2025, 152"></textarea>
        <br>
        <label>Год для прогноза: <input type="number" id="predictYear" value="2026" min="2000" max="2100"></label>
        <br>
        <button onclick="calculate()">Рассчитать</button>
    </div>

    <div class="result" id="result">
        <h3>Результаты расчёта</h3>
        <div id="resultContent"></div>
        <canvas id="chart" width="700" height="400"></canvas>
    </div>

    <script>
        function calculate() {
            let input = document.getElementById('dataInput').value.trim();
            let predictYear = parseInt(document.getElementById('predictYear').value);
            
            if (!input) {
                alert('Введите данные!');
                return;
            }

            let lines = input.split('\n');
            let years = [];
            let yValues = [];
            let xValues = [];

            for (let i = 0; i < lines.length; i++) {
                let parts = lines[i].split(',');
                if (parts.length >= 2) {
                    let year = parseInt(parts[0].trim());
                    let y = parseFloat(parts[1].trim());
                    if (!isNaN(year) && !isNaN(y)) {
                        years.push(year);
                        yValues.push(y);
                        xValues.push(i + 1);
                    }
                }
            }

            if (years.length < 3) {
                alert('Нужно минимум 3 точки данных!');
                return;
            }

            let n = years.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;

            for (let i = 0; i < n; i++) {
                sumX += xValues[i];
                sumY += yValues[i];
                sumXY += xValues[i] * yValues[i];
                sumX2 += xValues[i] * xValues[i];
            }

            let k = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            let b = (sumY - k * sumX) / n;

            k = Math.round(k * 100) / 100;
            b = Math.round(b * 100) / 100;

            let predictX = years[years.length - 1] - years[0] + 2;
            let prediction = Math.round((k * predictX + b) * 10) / 10;

            let resultDiv = document.getElementById('resultContent');
            resultDiv.innerHTML = '';

            let table = '<table><tr><th>Год</th><th>X (номер)</th><th>Y (продажи)</th><th>X²</th><th>X·Y</th></tr>';
            for (let i = 0; i < n; i++) {
                table += `<tr><td>${years[i]}</td><td>${xValues[i]}</td><td>${yValues[i]}</td><td>${xValues[i]*xValues[i]}</td><td>${xValues[i]*yValues[i]}</td></tr>`;
            }
            table += `<tr style="font-weight:bold; background:#f0f0f0;"><td>Суммы</td><td>${sumX}</td><td>${sumY}</td><td>${sumX2}</td><td>${sumXY}</td></tr>`;
            table += '</table>';

            resultDiv.innerHTML += table;
            resultDiv.innerHTML += `<p>Система уравнений: <strong>${n}b + ${sumX}k = ${sumY}</strong> и <strong>${sumX}b + ${sumX2}k = ${sumXY}</strong></p>`;
            resultDiv.innerHTML += `<p>Уравнение тренда: <strong>y = ${b} + ${k}x</strong></p>`;
            resultDiv.innerHTML += `<p>Каждый год продажи растут в среднем на <strong>${k}</strong> тыс. шт.</p>`;
            resultDiv.innerHTML += `<p class="prediction">Прогноз на ${predictYear} год: ${prediction} тыс. шт.</p>`;

            document.getElementById('result').style.display = 'block';

            drawChart(xValues, yValues, k, b, predictX, prediction, years);
        }

        function drawChart(xVals, yVals, k, b, predX, predY, years) {
            let canvas = document.getElementById('chart');
            let ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let padding = 80;
            let w = canvas.width - padding * 2;
            let h = canvas.height - padding * 2;
            
            let allX = [...xVals, predX];
            let minX = Math.min(...allX) - 0.5;
            let maxX = Math.max(...allX) + 0.5;
            
            let allY = [...yVals, predY];
            let minY = Math.min(...allY) - 20;
            let maxY = Math.max(...allY) + 20;
            
            function toX(val) { return padding + (val - minX) / (maxX - minX) * w; }
            function toY(val) { return padding + h - (val - minY) / (maxY - minY) * h; }
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, padding + h);
            ctx.lineTo(padding + w, padding + h);
            ctx.stroke();
            
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            
            for (let i = Math.ceil(minX); i <= maxX; i++) {
                let x = toX(i);
                ctx.fillText(i, x, padding + h + 20);
                ctx.beginPath();
                ctx.strokeStyle = '#ddd';
                ctx.moveTo(x, padding);
                ctx.lineTo(x, padding + h);
                ctx.stroke();
            }
            
            ctx.textAlign = 'right';
            for (let i = Math.floor(minY / 10) * 10; i <= maxY; i += 20) {
                let y = toY(i);
                ctx.fillText(i, padding - 10, y + 4);
                ctx.beginPath();
                ctx.strokeStyle = '#ddd';
                ctx.moveTo(padding, y);
                ctx.lineTo(padding + w, y);
                ctx.stroke();
            }
            
            ctx.fillStyle = '#4CAF50';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Год (X)', padding + w/2, padding + h + 45);
            ctx.save();
            ctx.translate(15, padding + h/2);
            ctx.rotate(-Math.PI/2);
            ctx.fillText('Продажи, тыс. шт. (Y)', 0, 0);
            ctx.restore();
            
            for (let i = 0; i < xVals.length; i++) {
                let cx = toX(xVals[i]);
                let cy = toY(yVals[i]);
                
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.font = '11px Arial';
                ctx.fillText(`${years[i]}`, cx, cy - 12);
            }
            
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let x1 = minX;
            let y1 = k * x1 + b;
            let x2 = maxX;
            let y2 = k * x2 + b;
            ctx.moveTo(toX(x1), toY(y1));
            ctx.lineTo(toX(x2), toY(y2));
            ctx.stroke();
            
            let px = toX(predX);
            let py = toY(predY);
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(px, py, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.font = 'bold 13px Arial';
            ctx.fillText(`Прогноз: ${predY}`, px, py - 18);
        }
    </script>

</body>
</html>
